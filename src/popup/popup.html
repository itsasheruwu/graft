<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Tweaks</title>
    <style>
      :root {
        font-family: system-ui, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #e2e8f0;
        background: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 300px;
        padding: 12px 14px 14px;
        background: #0f172a;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }

      .more {
        font-size: 12px;
        color: #7dd3fc;
        text-decoration: none;
        white-space: nowrap;
      }

      .more:hover {
        text-decoration: underline;
      }

      .tweak {
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 10px 10px 8px;
        margin-bottom: 8px;
        background: #1e293b;
      }

      .tweak h2 {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
      }

      .row:last-child {
        margin-bottom: 0;
      }

      input[type="checkbox"] {
        margin-top: 2px;
        flex-shrink: 0;
      }

      label {
        line-height: 1.35;
        cursor: pointer;
      }

      .hint {
        margin: 0;
        font-size: 11px;
        color: #94a3b8;
        line-height: 1.35;
      }

      .status {
        margin-top: 8px;
        min-height: 1.1rem;
        font-size: 11px;
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Browser Tweaks</h1>
      <a class="more" id="openOptions" href="#">All settings</a>
    </header>

    <section class="tweak" aria-labelledby="theme-syncer-heading">
      <h2 id="theme-syncer-heading">Theme Syncer</h2>
      <div class="row">
        <input type="checkbox" id="themeSyncerEnabled" />
        <label for="themeSyncerEnabled">Sync with system light / dark</label>
      </div>
      <div class="row">
        <input type="checkbox" id="themeSyncerYoutubeEnabled" />
        <label for="themeSyncerYoutubeEnabled">Include YouTube</label>
      </div>
      <p class="hint">
        Turn off “Include YouTube” if you use a fixed Light or Dark appearance there.
      </p>
    </section>

    <div id="status" class="status" aria-live="polite"></div>

    <script src="popup.js"></script>
  </body>
</html>
